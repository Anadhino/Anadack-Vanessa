<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Celebration</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        // Automatically play music on first user interaction
        const audio = new Audio('path/to/your/music.mp3');
        document.addEventListener('click', function() {
            audio.play();
            document.removeEventListener('click', arguments.callee);
        });

        // Form validation
        function validateForm() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const errorMessages = [];

            if (name.trim() === '') {
                errorMessages.push('Le nom est obligatoire.');
            }
            if (email.trim() === '') {
                errorMessages.push('L’email est obligatoire.');
            } else if (!/[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b/.test(email)) {
                errorMessages.push('Veuillez entrer une adresse email valide.');
            }

            if (errorMessages.length > 0) {
                alert(errorMessages.join('\n'));
                return false;
            }
            return true;
        }
    </script>
</head>
<body>
    <header>
        <div class="hero">
            <h1>Bienvenue à notre célébration de mariage</h1>
            <p class="romantic-description">Un amour éternel, une journée inoubliable.</p>
            <div class="qr-code">
                <img src="path/to/qr-code.png" alt="QR Code for wedding gifts">
            </div>
            <button onclick="window.location.href='gift-list.html'">Voir la liste de cadeaux</button>
        </div>
    </header>

    <main>
        <section class="gifts">
            <h2>Liste de cadeaux</h2>
            <!-- Add gift items with improved styling here -->
        </section>
    </main>
    <footer>
        <form onsubmit="return validateForm()">
            <input type="text" id="name" placeholder="Votre nom" required>
            <input type="email" id="email" placeholder="Votre email" required>
            <button type="submit">Soumettre</button>
        </form>
    </footer>
</body>
</html>
